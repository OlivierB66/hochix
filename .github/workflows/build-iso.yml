# This file was automatically generated with nix-actions.
name: Build Bureautix USB Installer

on:
  push:
    branches: [ main, develop ]
  pull_request:
  workflow_dispatch:  # Permet de déclencher manuellement

jobs:
  build-usb-installer:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # Peut être long
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Lix
        uses: samueldr/lix-gha-installer-action@8c7f8a4b0f594ab8a6dc3bf71c217587bbc756b5
      
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v5
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/flake.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-
      
      - name: Build USB installer
        run: nix-build -A usb-installer --keep-going
      
      - name: Check installer exists
        run: |
          ls -lh result/ || find result -type f -name "*.iso" -o -name "*.img"
      
      - name: Upload USB installer artifact (push)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: bureautix-usb-installer-${{ github.run_number }}
          path: result/
          retention-days: 30
      
      - name: Create Release (main branch)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: result/*
          tag_name: usb-installer-${{ github.run_number }}-${{ github.sha }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
