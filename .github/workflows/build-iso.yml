# This file was automatically generated with nix-actions.
name: Build Bureautix USB Installer

on:
  push:
    branches: [ main, develop ]
  pull_request:
  workflow_dispatch:

jobs:
  build-usb-installer:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Install Lix
        uses: samueldr/lix-gha-installer-action@8c7f8a4b0f594ab8a6dc3bf71c217587bbc756b5
      
      - name: Cache Nix store
        uses: nix-community/cache-nix-action@v5
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('**/flake.lock') }}
          restore-keys: |
            nix-${{ runner.os }}-
      
      - name: Build USB installer
        run: nix-build -A usb-installer
      
      - name: List build output
        run: |
          echo "=== Contents of result ==="
          find . -maxdepth 3 -type f \( -name "*.iso" -o -name "*.img" \) 2>/dev/null || echo "No ISO/IMG found"
          ls -lah result/ || echo "No result folder"
      
      - name: Upload USB installer artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: bureautix-usb-installer-${{ github.run_number }}
          path: result
          if-no-files-found: warn
          retention-days: 30
